name: Add task_type column
on:
  push:
    paths: ['.github/workflows/run_task_type.yml']

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SQL
        run: |
          QUERY=$(cat add_task_type.sql | python3 -c "import sys,json; print(json.dumps({'query': sys.stdin.read()}))")
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$QUERY" \
            "https://api.supabase.com/v1/projects/oehfptlkpqlpruaqogkk/database/query" \
          | python3 -c "import sys,json; r=json.load(sys.stdin); print('OK:', r)"
